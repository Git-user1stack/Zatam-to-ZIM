let selectedImages = ilist[setIndex].slice(0, PAIRS);
let selectedWords = wlist[setIndex].slice(0, PAIRS);

new Frame(FIT, 1024, 768, light, dark, ready);

function ready() {
    Ticker.always();

    let wrongMoves = 0;
    let matchesDone = 0;
    let wordCards = [];
    let pictureCards = [];
    let activeWord = null;
    let tempLine = null;
    let matchedLines = [];
    let isPlaying = false;

    const bar = new Rectangle(W,40,black).addTo();
    const arrow = makeIcon({type:"arrowstick", color:white, scale:1.2});
    const returnButton = new Button({
        width:60,
        height:60,
        backgroundColor:"lighter",
        rollBackgroundColor:"red",
        gradient:.3,
        corner:30,
        icon:arrow,
    }).scaleTo(bar,80,80).loc(5,5)
    .tap(() => {
        window.location.href = "../../HomePage.html";
    });
    arrow.rotation = 180;
    new Label("Match क्रीडा", 36, "Bitcount Grid Double", blue).pos(0,3,CENTER,CENTER,bar);

    const wrongLabel = new Label({
        text:"Wrong Moves: ०",
        size:25,
        color:red,
        bold:true,
        outlineColor:black,
        align:LEFT
    }).pos(300,95,LEFT,TOP);

    const matchLabel = new Label({
        text:`Matches: ० / ${toDevanagari(PAIRS)}`,
        size:25,
        color:green,
        bold:true,
        outlineColor:black,
        align:CENTER
    }).pos(300,95,RIGHT,TOP);

    const timer = new Timer({
        time:0,
        down:false,
        colon:true,
        startPaused:false,
        size:25,
        color:black,
        backgroundColor:yellow,
        borderColor:black,
        borderWidth:2,
        width:135,
        height:45
    }).pos(115,150,RIGHT,TOP);
    timer.start();

    const progressBar = new ProgressBar({
        barType:"rectangle",
        width:360,
        backingColor:white,
        barColor:green,
        borderColor:black,
        corner:14,
        autoHide:false
    }).pos(0,150,CENTER,TOP);

    const message = new Label({
        text:"Drag from a word to its matching picture.",
        size:22,
        color:black,
        bold:true,
        align:CENTER
    }).pos(0,193,CENTER,TOP);

    const board = new Container(900,430).pos(0,225,CENTER,TOP);
    const lineLayer = new Container(900,430).addTo(board);
    const cardLayer = new Container(900,430).addTo(board);

    const easyButton = new Button({
        label:new Label({text:"EASY", size:18}),
        width:90,
        height:40,
        backgroundColor:green,
        color:white
    }).tap(() => setDifficulty(4, 2)).pos(-100,65,CENTER,BOTTOM);

    const mediumButton = new Button({
        label:new Label({text:"MEDIUM", size:18}),
        width:90,
        height:40,
        backgroundColor:orange,
        color:white
    }).tap(() => setDifficulty(4, 3)).pos(0,65,CENTER,BOTTOM);

    const hardButton = new Button({
        label:new Label({text:"HARD", size:18}),
        width:90,
        height:40,
        backgroundColor:red,
        color:white
    }).tap(() => setDifficulty(4, 4)).pos(100,65,CENTER,BOTTOM);

    const resetButton = new Button({
        label:new Label({
            text:"RESTART",
            size:18
        }),
        width:150,
        height:40,
        backgroundColor:purple,
        rollBackgroundColor:purple.lighten(.2),
        color:white
    }).pos(0,15,CENTER,BOT).tap(resetGame);

    makeGame();

    function makeGame() {
        lineLayer.removeAllChildren();
        cardLayer.removeAllChildren();
        wordCards = [];
        pictureCards = [];
        matchedLines = [];
        activeWord = null;
        tempLine = null;
        wrongMoves = 0;
        matchesDone = 0;
        isPlaying = true;

        message.color = black;
        message.text = "Drag from a word to its matching picture.";
        wrongLabel.text = "Wrong Moves: ०";
        matchLabel.text = `Matches: ० / ${toDevanagari(PAIRS)}`;
        updateProgress();
        timer.stop();
        timer.time = 0;
        timer.start();

        new Rectangle(900,430,white,black,2,18).addTo(cardLayer).alp(.45).bot();

        new Label({text:"Words", size:26, color:purple, bold:true}).loc(150,18,cardLayer);
        new Label({text:"Pictures", size:26, color:purple, bold:true}).loc(655,18,cardLayer);

        const pictureOrder = shuffle(Array.from({length:PAIRS}, (_,i)=>i));
        const wordW = 230;

        let rowGap, startY, wordH, picH, picW;

        if (PAIRS === 4) {          // Easy
            rowGap = 78;
            startY = 95;
            wordH = 48;
            picH = 58;
            picW = 98;
        }
        else if (PAIRS === 6) {     // Medium
            rowGap = 58;
            startY = 80;
            wordH = 42;
            picH = 50;
            picW = 92;
        }
        else if (PAIRS === 8) {     // Hard
            rowGap = 48;
            startY = 70;
            wordH = 38;
            picH = 42;
            picW = 98;
        }

        loop(PAIRS, i => {
            const y = startY + i * rowGap;
            const wordCard = makeWordCard(selectedWords[i], i, wordW, wordH)
                .loc(190, y, cardLayer);
            wordCards.push(wordCard);
        });

        loop(PAIRS, i => {
            const pairIndex = pictureOrder[i];
            const y = startY + i * rowGap;
            const picCard = makePictureCard(selectedImages[pairIndex], pairIndex, picW, picH)
                .loc(705, y, cardLayer);
            pictureCards.push(picCard);
        });

        lineLayer.top();
        cardLayer.top();
        S.update();
    }

    function makeWordCard(word, pairIndex, w, h) {
        const card = new Container(w,h).reg(CENTER);
        card.pairIndex = pairIndex;
        card.cardW = w;
        card.cardH = h;
        card.locked = false;
        card.kind = "word";
        card.cursor = "pointer";

        card.back = new Rectangle(w,h,blue.darken(.45),white,2,10).centerReg(card);
        new Label({
            text:word,
            size: h < 35 ? 16 : 20,
            color:white,
            bold:true,
            align:CENTER,
            valign:CENTER,
            lineWidth:w-20
        }).centerReg(card);

        card.on("mousedown", () => startLine(card));
        card.on("pressmove", e => moveLine(e));
        card.on("pressup", e => finishLine(e));
        return card;
    }

    function makePictureCard(src, pairIndex, w, h) {
        const card = new Container(w,h).reg(CENTER);
        card.pairIndex = pairIndex;
        card.cardW = w;
        card.cardH = h;
        card.locked = false;
        card.kind = "picture";

        card.back = new Rectangle(w,h,white,blue,2,10).centerReg(card);

        const mask = new Rectangle(w-10, h-10, white).centerReg(card);
        const pic = new Pic(src).addTo(card);
        pic.on("ready", () => {
            pic.centerReg(card);
            pic.scaleTo(mask, 100, 100);
            pic.setMask(mask);
            S.update();
        });
        return card;
    }

    function startLine(wordCard) {
        if (!isPlaying || wordCard.locked) return;
        message.color = orange;
        message.text = "Release the line on the matching picture.";
        activeWord = wordCard;
        wordCard.top();
        tempLine = new Shape().addTo(lineLayer);
        drawLine(tempLine, getWordPoint(wordCard), getWordPoint(wordCard), orange, 5);
        S.update();
    }

    function moveLine(e) {
        if (!activeWord || !tempLine) return;
        const p = board.globalToLocal(e.stageX, e.stageY);
        drawLine(tempLine, getWordPoint(activeWord), p, orange, 5);
        S.update();
    }

    function finishLine(e) {
        if (!activeWord || !tempLine) return;
        const p = board.globalToLocal(e.stageX, e.stageY);
        const target = getPictureAt(p.x, p.y);

        if (target && !target.locked && target.pairIndex === activeWord.pairIndex) {
            tempLine.removeFrom();
            tempLine = null;
            connectCorrect(activeWord, target);
        } else {
            tempLine.removeFrom();
            tempLine = null;
            wrongMoves++;
            wrongLabel.text = `Wrong Moves: ${toDevanagari(wrongMoves)}`;
            message.color = red;
            message.text = "Try again — that picture does not match.";
            activeWord.back.borderColor = red;
            timeout(.35, () => {
                if (activeWord && !activeWord.locked) activeWord.back.borderColor = white;
                S.update();
            });
        }

        activeWord = null;
        S.update();
    }

    function connectCorrect(wordCard, picCard) {
        const line = new Shape().addTo(lineLayer);
        drawLine(line, getWordPoint(wordCard), getPicturePoint(picCard), green, 6);
        matchedLines.push(line);

        wordCard.locked = true;
        picCard.locked = true;
        wordCard.mouseEnabled = false;
        wordCard.cursor = "default";
        wordCard.back.borderColor = green;
        picCard.back.borderColor = green;

        new Label({text:"✔", size:24, color:green, bold:true}).pos(8,0,RIGHT,TOP,wordCard);
        new Label({text:"✔", size:24, color:green, bold:true}).pos(8,0,RIGHT,TOP,picCard);

        matchesDone++;
        matchLabel.text = `Matches: ${toDevanagari(matchesDone)} / ${toDevanagari(PAIRS)}`;
        updateProgress();
        message.color = green;
        message.text = "Correct match!";

        if (matchesDone === PAIRS) finishGame();
    }

    function drawLine(shape, p1, p2, strokeColor, strokeWidth) {
        shape.graphics.clear()
            .setStrokeStyle(strokeWidth, "round")
            .beginStroke(strokeColor)
            .moveTo(p1.x, p1.y)
            .lineTo(p2.x, p2.y)
            .endStroke();
    }

    function getWordPoint(card) {
        return {x:card.x + card.cardW/2 + 12, y:card.y};
    }

    function getPicturePoint(card) {
        return {x:card.x - card.cardW/2 - 12, y:card.y};
    }

    function getPictureAt(x, y) {
        return pictureCards.find(pic => {
            const pad = 14;
            return !pic.locked &&
                x >= pic.x - pic.cardW/2 - pad &&
                x <= pic.x + pic.cardW/2 + pad &&
                y >= pic.y - pic.cardH/2 - pad &&
                y <= pic.y + pic.cardH/2 + pad;
        });
    }

    function updateProgress() {
        progressBar.percent = matchesDone / PAIRS * 100;
        S.update();
    }

    function finishGame() {
        isPlaying = false;
        timer.pause(true);
        const finalScore = Math.round(timer.time) + wrongMoves * 10;

        message.color = green;
        message.text = `उत्तमम्! Complete — Score: ${toDevanagari(finalScore)}`;

        const pane = new Pane({
            width:600,
            height:330,
            color:black,
            backgroundColor:yellow.lighten(.35),
            close:true
        });

        new Label({
            text:`उत्तमम्! You connected all pairs!

        Time: ${timer.text}
        Wrong Moves: ${toDevanagari(wrongMoves)}
        Matches: ${toDevanagari(matchesDone)} / ${toDevanagari(PAIRS)}
        Score: ${toDevanagari(finalScore)}`,
            size:24,
            color:black,
            align:CENTER,
            valign:CENTER
        })
        .center(pane)
        .mov(0,-35);

        new Button({
            label:new Label({
                text:"PLAY AGAIN",
                size:18
            }),
            width:150,
            height:40,
            backgroundColor:green,
            color:white
        })
        .pos(0,35,CENTER,BOT,pane)
        .tap(() => {
            pane.hide();
            resetGame();
        });

        pane.show();
    }

    function setDifficulty(rows, cols) {
        ROWS = rows;
        COLS = cols;
        PAIRS = ROWS * COLS / 2;
        setIndex = Math.floor(Math.random() * Math.min(wlist.length, ilist.length));
        selectedImages = ilist[setIndex].slice(0, PAIRS);
        selectedWords = wlist[setIndex].slice(0, PAIRS);
        resetGame(false);
    }

    function resetGame(randomSet=true) {
        if (randomSet) {
            setIndex = Math.floor(Math.random() * Math.min(wlist.length, ilist.length));
            selectedImages = ilist[setIndex].slice(0, PAIRS);
            selectedWords = wlist[setIndex].slice(0, PAIRS);
        }
        makeGame();
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function toDevanagari(value) {
        return String(value).replace(/[0-9]/g, d => "०१२३४५६७८९"[d]);
    }

    S.update();
}
</script>
