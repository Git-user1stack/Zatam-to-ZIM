<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,user-scalable=no"/>
  <title>Memory Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://zimjs.org/cdn/1.5.0/createjs.js"></script>
  <script src="https://zimjs.org/cdn/018/zim_min.js"></script>

  <!-- Shared Firebase config — initialises Firebase and exposes uploadScore() -->
  <script src="../firebase-config.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#1a1035;overflow:hidden}
    canvas{display:block}

    /* ── Leaderboard overlay (HTML layer on top of canvas) ── */
    #lb-overlay{
      display:none;position:fixed;inset:0;background:rgba(10,6,30,.92);
      z-index:9999;align-items:center;justify-content:center;
      font-family:'Nunito',sans-serif;
    }
    #lb-overlay.show{display:flex;}
    #lb-box{
      background:#2d1f5e;border:2px solid #4a3880;border-radius:20px;
      width:520px;max-height:80vh;overflow:hidden;
      display:flex;flex-direction:column;
    }
    #lb-header{
      background:#251848;padding:18px 24px 14px;
      border-bottom:1px solid #4a3880;
      display:flex;align-items:center;justify-content:space-between;
    }
    #lb-header h2{color:#f0ecff;font-family:'Fredoka One',sans-serif;font-size:22px;margin:0;}
    #lb-header span{color:#9b8ec4;font-size:13px;}
    #lb-close{
      background:transparent;border:1px solid #4a3880;color:#9b8ec4;
      border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;
      display:flex;align-items:center;justify-content:center;
    }
    #lb-close:hover{background:#4a3880;color:#f0ecff;}
    #lb-tabs{display:flex;padding:12px 24px 0;gap:8px;background:#2d1f5e;}
    .lb-tab{
      padding:7px 16px;border-radius:20px;border:1px solid #4a3880;
      color:#9b8ec4;cursor:pointer;font-size:12px;font-weight:700;
      font-family:'Nunito',sans-serif;background:transparent;
    }
    .lb-tab.active{background:#4D96FF;border-color:#4D96FF;color:#0f0a1e;}
    #lb-body{overflow-y:auto;padding:14px 24px 20px;flex:1;}
    #lb-body table{width:100%;border-collapse:collapse;}
    #lb-body th{
      color:#9b8ec4;font-size:11px;font-weight:700;text-align:left;
      padding:6px 8px;border-bottom:1px solid #4a3880;
    }
    #lb-body td{color:#f0ecff;font-size:13px;padding:9px 8px;border-bottom:1px solid #251848;}
    #lb-body tr:first-child td{color:#FFD93D;font-weight:800;}
    #lb-body tr:nth-child(2) td{color:#9b8ec4;}
    #lb-body tr:nth-child(3) td{color:#FF9F43;}
    .lb-medal{font-size:16px;margin-right:4px;}
    #lb-empty{color:#9b8ec4;text-align:center;padding:30px;font-size:14px;}
    #lb-loading{color:#9b8ec4;text-align:center;padding:30px;font-size:14px;}
    #name-form{
      display:none;position:fixed;inset:0;background:rgba(10,6,30,.95);
      z-index:10000;align-items:center;justify-content:center;
    }
    #name-form.show{display:flex;}
    #name-box{
      background:#2d1f5e;border:2px solid #4D96FF;border-radius:20px;
      padding:32px 36px;width:380px;text-align:center;
      font-family:'Nunito',sans-serif;
    }
    #name-box h3{color:#f0ecff;font-family:'Fredoka One',sans-serif;font-size:24px;margin-bottom:6px;}
    #name-box p{color:#9b8ec4;font-size:13px;margin-bottom:20px;}
    #name-input{
      width:100%;padding:11px 16px;border-radius:12px;
      background:#251848;border:1px solid #4a3880;color:#f0ecff;
      font-size:16px;font-family:'Nunito',sans-serif;outline:none;
      box-sizing:border-box;margin-bottom:16px;
    }
    #name-input:focus{border-color:#4D96FF;}
    #name-submit{
      width:100%;padding:12px;border-radius:12px;border:none;
      background:#4D96FF;color:#0f0a1e;font-size:16px;font-weight:800;
      font-family:'Fredoka One',sans-serif;cursor:pointer;
    }
    #name-submit:hover{background:#6eb3ff;}
    #name-skip{
      background:transparent;border:none;color:#9b8ec4;
      font-size:12px;cursor:pointer;margin-top:10px;
      font-family:'Nunito',sans-serif;text-decoration:underline;
    }
  </style>
</head>
<body>

<!-- Player name form (shown on first win if no name stored) -->
<div id="name-form">
  <div id="name-box">
    <h3>🏆 You Won!</h3>
    <p>Enter your name to save your score to the leaderboard.</p>
    <input id="name-input" type="text" placeholder="Your name" maxlength="24"/>
    <button id="name-submit">Save Score</button><br/>
    <button id="name-skip">Skip</button>
  </div>
</div>

<!-- Leaderboard overlay -->
<div id="lb-overlay">
  <div id="lb-box">
    <div id="lb-header">
      <div>
        <h2>🏅 Leaderboard</h2>
        <span>Memory Match · Best scores</span>
      </div>
      <button id="lb-close">✕</button>
    </div>
    <div id="lb-tabs">
      <button class="lb-tab active" data-diff="easy">Easy</button>
      <button class="lb-tab" data-diff="medium">Medium</button>
      <button class="lb-tab" data-diff="hard">Hard</button>
    </div>
    <div id="lb-body">
      <div id="lb-loading">Loading…</div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  FIREBASE — uses shared firebase-config.js loaded above.
//  That file initialises the app and exposes uploadScore().
// ════════════════════════════════════════════════════════

// ── Local player name storage ──────────────────────────
const PLAYER_KEY = 'zatam_playerName';
function getPlayerName(){ return localStorage.getItem(PLAYER_KEY) || ''; }
function setPlayerName(n){ localStorage.setItem(PLAYER_KEY, n.trim()); }

// ── Score submission — calls the shared uploadScore() ──
// score = lower is better: moves weighted heavily, time as tiebreaker
function submitScore({ playerName, moves, timeSecs, stars }){
  const finalScore = moves * 100 + timeSecs;
  if(typeof uploadScore === 'function'){
    uploadScore({
      userId    : '',          // firebase-config.js fills this from auth if available
      playerName: playerName || 'Anonymous',
      email     : '',
      photoURL  : '',
      gameId    : 'memory',
      gameName  : 'Memory Match',
      score     : finalScore,
      createdAt : new Date(),
      scoreDate : new Date().toISOString(),
    });
  } else {
    console.warn('[Memory Match] uploadScore not found – is firebase-config.js loaded?');
  }
}

// ── Leaderboard fetch & render ─────────────────────────
let currentLbDiff = 'easy';

async function fetchLeaderboard(diff){
  const body = document.getElementById('lb-body');
  body.innerHTML = '<div id="lb-loading">Loading…</div>';

  // firebase-config.js should expose `db` (Firestore instance)
  const firestore = (typeof db !== 'undefined') ? db : null;
  if(!firestore){
    body.innerHTML = '<div id="lb-empty">Leaderboard not available<br><small>firebase-config.js not loaded</small></div>';
    return;
  }
  try{
    const snap = await firestore.collection('leaderboard')
      .where('gameId','==','memory')
      .orderBy('score','asc')
      .limit(10)
      .get();
    if(snap.empty){ body.innerHTML = '<div id="lb-empty">No scores yet – be the first! 🎯</div>'; return; }
    const medals = ['🥇','🥈','🥉'];
    let html = '<table><thead><tr><th>#</th><th>Player</th><th>Score</th><th>⭐</th></tr></thead><tbody>';
    snap.docs.forEach((doc,i)=>{
      const d = doc.data();
      const m = medals[i] ? `<span class="lb-medal">${medals[i]}</span>` : '';
      html += `<tr><td>${m}${i+1}</td><td>${escHtml(d.playerName||'Anonymous')}</td><td>${d.score}</td><td>${'⭐'.repeat(d.stars||1)}</td></tr>`;
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  } catch(e){
    console.error('[Memory Match] fetchLeaderboard error', e);
    body.innerHTML = '<div id="lb-empty">Error loading scores.</div>';
  }
}

function escHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(s){ const m=Math.floor(s/60),sec=s%60; return m>0?m+'m '+String(sec).padStart(2,'0')+'s':sec+'s'; }

function openLeaderboard(diff){
  currentLbDiff = diff||'easy';
  document.querySelectorAll('.lb-tab').forEach(t=> t.classList.toggle('active', t.dataset.diff===currentLbDiff));
  document.getElementById('lb-overlay').classList.add('show');
  fetchLeaderboard(currentLbDiff);
}
document.getElementById('lb-close').onclick = ()=> document.getElementById('lb-overlay').classList.remove('show');
document.querySelectorAll('.lb-tab').forEach(t=>{
  t.onclick = ()=>{ currentLbDiff=t.dataset.diff; document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); fetchLeaderboard(currentLbDiff); };
});

// ── Name-capture promise helper ────────────────────────
let _nameResolve = null;
function askPlayerName(){
  return new Promise(resolve=>{
    _nameResolve = resolve;
    document.getElementById('name-form').classList.add('show');
    document.getElementById('name-input').value = getPlayerName();
    document.getElementById('name-input').focus();
  });
}
document.getElementById('name-submit').onclick = ()=>{
  const v = document.getElementById('name-input').value.trim();
  if(v) setPlayerName(v);
  document.getElementById('name-form').classList.remove('show');
  if(_nameResolve){ _nameResolve(v||'Anonymous'); _nameResolve=null; }
};
document.getElementById('name-skip').onclick = ()=>{
  document.getElementById('name-form').classList.remove('show');
  if(_nameResolve){ _nameResolve(getPlayerName()||'Anonymous'); _nameResolve=null; }
};
document.getElementById('name-input').onkeydown = e=>{ if(e.key==='Enter') document.getElementById('name-submit').click(); };

// ════════════════════════════════════════════════════════
//  GAME
// ════════════════════════════════════════════════════════

const C = {
  bg:"#1a1035", panel:"#2d1f5e", card:"#251848", border:"#4a3880",
  back:"#3a2a6e", green:"#6BCB77", yellow:"#FFD93D", blue:"#4D96FF",
  red:"#FF6B6B", muted:"#9b8ec4", light:"#f0ecff", dark:"#0f0a1e",
};

const ALL_PAIRS = [
  {id:1, emoji:"🐶", word:"Dog",       color:"#FF9F43"},
  {id:2, emoji:"🐱", word:"Cat",       color:"#FF6B6B"},
  {id:3, emoji:"🌸", word:"Flower",    color:"#FF85C2"},
  {id:4, emoji:"🌙", word:"Moon",      color:"#A29BFE"},
  {id:5, emoji:"🔥", word:"Fire",      color:"#FF6348"},
  {id:6, emoji:"🌊", word:"Wave",      color:"#4D96FF"},
  {id:7, emoji:"⚡", word:"Lightning", color:"#FFD93D"},
  {id:8, emoji:"🍀", word:"Clover",    color:"#6BCB77"},
  {id:9, emoji:"🎵", word:"Music",     color:"#FF85C2"},
  {id:10,emoji:"🌈", word:"Rainbow",   color:"#A29BFE"},
  {id:11,emoji:"🦋", word:"Butterfly", color:"#6BCB77"},
  {id:12,emoji:"🍕", word:"Pizza",     color:"#FF9F43"},
];

const DIFF = {
  easy:  {cols:4,rows:4,pairs:8, cw:140,ch:110,gap:18,label:"Easy",  color:C.green, thresh:[10,16]},
  medium:{cols:5,rows:4,pairs:10,cw:114,ch:100,gap:14,label:"Medium",color:C.yellow,thresh:[14,22]},
  hard:  {cols:6,rows:4,pairs:12,cw:100,ch:90, gap:10,label:"Hard",  color:C.red,   thresh:[18,28]},
};

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function buildDeck(n){
  const deck=[];
  ALL_PAIRS.slice(0,n).forEach(p=>{
    deck.push({id:p.id,type:"picture",emoji:p.emoji,word:p.word,color:p.color});
    deck.push({id:p.id,type:"word",   emoji:p.emoji,word:p.word,color:p.color});
  });
  return shuffle(deck);
}
function getRating(m,t){return m<=t[0]?3:m<=t[1]?2:1;}

let _ac;
function tone(f,t,d,v,dl=0){
  try{
    _ac=_ac||new(window.AudioContext||window.webkitAudioContext)();
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.connect(g);g.connect(_ac.destination);o.type=t;
    o.frequency.setValueAtTime(f,_ac.currentTime+dl);
    g.gain.setValueAtTime(v,_ac.currentTime+dl);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+dl+d);
    o.start(_ac.currentTime+dl);o.stop(_ac.currentTime+dl+d);
  }catch(e){}
}
const SFX={
  flip :()=>tone(520,"sine",.1,.15),
  match:()=>{tone(520,"sine",.12,.18);tone(780,"sine",.15,.2,.12);},
  miss :()=>tone(200,"sawtooth",.1,.1),
  win  :()=>[523,659,784,1047].forEach((f,i)=>tone(f,"sine",.2,.18,i*.1)),
};

const GW=1024, GH=768, HEADER=90, FOOTER=60;
const frame = new Frame(FIT, GW, GH, C.bg, C.bg);

frame.on("ready", ()=>{
  const stage = frame.stage;
  const W = frame.width, H = frame.height;

  createjs.Ticker.timingMode = createjs.Ticker.RAF;
  createjs.Ticker.on("tick", stage);

  const bgS = new Shape(W,H);
  for(let x=0;x<W;x+=40) for(let y=0;y<H;y+=40)
    bgS.graphics.beginFill("rgba(255,255,255,.04)").drawCircle(x,y,1.5).endFill();
  bgS.addTo(stage);
  const glS = new Shape(W,H);
  glS.graphics.beginRadialGradientFill(
    ["rgba(90,60,200,.4)","rgba(26,16,53,0)"],[0,1],
    W/2,H/2,0, W/2,H/2,W*.55
  ).drawRect(0,0,W,H).endFill();
  glS.addTo(stage);

  // ── Header ────────────────────────────────────────────
  const hdr = new Container(W, HEADER).addTo(stage);
  new Rectangle(W, HEADER, C.panel).addTo(hdr);
  new Rectangle(W, 3, C.yellow).pos(0,HEADER-3,LEFT,TOP,hdr);
  new Label({text:"Memory Match",size:34,font:"Fredoka One",color:C.light}).pos(32,-6,LEFT,CENTER,hdr);
  new Label({text:"Pictures to Words",size:13,font:"Nunito",color:C.muted}).pos(36,14,LEFT,CENTER,hdr);

  // Leaderboard button in header
  const lbBtn = new Container(130,34).addTo(hdr);
  lbBtn.x = W-280; lbBtn.y = (HEADER-34)/2;
  new Rectangle(130,34,"transparent",C.yellow,1,17).addTo(lbBtn);
  new Label({text:"🏅 Leaderboard",size:11,font:"Nunito",color:C.yellow,bold:true}).pos(0,0,CENTER,CENTER,lbBtn);
  lbBtn.cursor="pointer";
  lbBtn.on("click",()=>openLeaderboard(activeDiff));

  function scoreBlock(lbl,val,color,x){
    const b=new Container(100,56).addTo(hdr); b.x=x; b.y=(HEADER-56)/2;
    new Rectangle(100,56,C.card,color,2,10).addTo(b);
    new Label({text:lbl,size:10,font:"Nunito",color:C.muted,bold:true}).pos(0,7,CENTER,TOP,b);
    const v=new Label({text:String(val),size:24,font:"Fredoka One",color}).pos(0,0,CENTER,CENTER,b);
    return v;
  }
  const movLbl = scoreBlock("MOVES","0",C.blue,  W-360);
  const parLbl = scoreBlock("PAIRS","0",C.green, W-245);
  const timLbl = scoreBlock("TIME", "0s",C.yellow,W-130);

  // ── Footer ────────────────────────────────────────────
  const ftr = new Container(W, FOOTER).addTo(stage);
  ftr.y = H-FOOTER;
  new Rectangle(W, FOOTER, C.panel).addTo(ftr);
  new Rectangle(W, 3, C.blue).pos(0,0,LEFT,TOP,ftr);
  new Label({text:"DIFFICULTY",size:11,font:"Nunito",color:C.muted,bold:true}).pos(24,0,LEFT,CENTER,ftr);

  let activeDiff = "easy";
  const chipObjs = {};
  function makeChip(key,x){
    const d=DIFF[key];
    const chip=new Container(88,32).addTo(ftr); chip.x=x; chip.y=(FOOTER-32)/2;
    const bg=new Rectangle(88,32,key===activeDiff?d.color:"transparent",d.color,2,16).addTo(chip);
    const lbl=new Label({text:d.label,size:12,font:"Nunito",color:key===activeDiff?C.dark:d.color,bold:true})
      .pos(0,0,CENTER,CENTER,chip);
    chip.cursor="pointer"; chip.bg=bg; chip.lbl=lbl; chip.color=d.color; chip.key=key;
    chip.on("click",()=>{
      if(chip.key===activeDiff) return;
      Object.values(chipObjs).forEach(c=>{c.bg.color="transparent";c.lbl.color=c.color;});
      bg.color=d.color; lbl.color=C.dark;
      activeDiff=key;
      startGame(key);
    });
    chipObjs[key]=chip;
  }
  makeChip("easy",140); makeChip("medium",238); makeChip("hard",336);

  const rstBtn=new Container(110,32).addTo(ftr);
  rstBtn.x=W-128; rstBtn.y=(FOOTER-32)/2;
  new Rectangle(110,32,"transparent",C.muted,1,16).addTo(rstBtn);
  new Label({text:"↺  Restart",size:12,font:"Nunito",color:C.muted,bold:true}).pos(0,0,CENTER,CENTER,rstBtn);
  rstBtn.cursor="pointer";
  rstBtn.on("click",()=>startGame(activeDiff));

  let gameLayer = null;
  let moves=0, pairs=0, secs=0, started=false;
  let timerID=null, locked=false, first=null;

  function startTimer(){
    if(started) return; started=true;
    timerID=setInterval(()=>{secs++; timLbl.text=fmtTime(secs);},1000);
  }
  function stopTimer(){clearInterval(timerID); timerID=null;}
  function resetState(){
    stopTimer();
    moves=0; pairs=0; secs=0; started=false; locked=false; first=null;
    movLbl.text="0"; parLbl.text="0"; timLbl.text="0s";
  }

  function revealCard(card){
    card.flipped=true; card.bk.visible=false; card.ft.visible=true; SFX.flip();
    card.scaleX=0.85; card.scaleY=0.85;
    animate({target:card,props:{scaleX:1,scaleY:1},time:160,ease:"backOut"});
  }
  function hideCard(card){
    card.flipped=false; card.ft.visible=false; card.bk.visible=true;
    card.scaleX=0.85; card.scaleY=0.85;
    animate({target:card,props:{scaleX:1,scaleY:1},time:160,ease:"backOut"});
  }
  function lockMatch(a,b){
    SFX.match(); a.matched=true; b.matched=true;
    a.cursor="default"; b.cursor="default";
    [a,b].forEach(c=>{
      new Rectangle(c.cw,c.ch,"rgba(107,203,119,.22)","#6BCB77",2,12).addTo(c);
      const badge=new Container(26,26).addTo(c); badge.x=c.cw-32; badge.y=6;
      new Circle(13,"#6BCB77").pos(0,0,LEFT,TOP,badge);
      new Label({text:"✓",size:13,font:"Nunito",color:C.dark,bold:true}).pos(0,-1,CENTER,CENTER,badge);
      animate({target:c,props:{scaleX:1.1,scaleY:1.1},time:90,ease:"quadOut",
        call:()=>animate({target:c,props:{scaleX:1,scaleY:1},time:200,ease:"elasticOut"})});
    });
    pairs++; parLbl.text=String(pairs);
    if(pairs===DIFF[activeDiff].pairs){stopTimer(); setTimeout(()=>showWin(activeDiff),600);}
  }

  function onCardClick(card){
    if(card.flipped||card.matched||locked) return;
    if(!first){
      startTimer(); first=card; revealCard(card);
    } else {
      locked=true; const a=first; first=null;
      revealCard(card); moves++; movLbl.text=String(moves);
      setTimeout(()=>{
        if(a.data.id===card.data.id && a.data.type!==card.data.type){
          lockMatch(a,card); locked=false;
        } else {
          SFX.miss();
          [a,card].forEach(c=>{
            animate({target:c,props:{x:c.x-6},time:50,ease:"quadOut",call:()=>
              animate({target:c,props:{x:c.x+12},time:70,ease:"quadInOut",call:()=>
                animate({target:c,props:{x:c.x-6},time:50,ease:"quadOut"})})});
          });
          setTimeout(()=>{hideCard(a); hideCard(card); locked=false;},650);
        }
      },800);
    }
  }

  // ── Win screen ────────────────────────────────────────
  async function showWin(diffKey){
    SFX.win();
    const d = DIFF[diffKey];
    const stars = getRating(moves, d.thresh);
    const str = "⭐".repeat(stars)+"✩".repeat(3-stars);

    // Submit score (ask name if needed, then call uploadScore via submitScore)
    let playerName = getPlayerName();
    if(!playerName){
      playerName = await askPlayerName();
    }
    submitScore({ playerName, moves, timeSecs:secs, stars });

    const ov=new Rectangle(W,H,"rgba(10,6,30,.85)").addTo(stage);
    ov.alpha=0; animate({target:ov,props:{alpha:1},time:300});
    const pn=new Container(500,410).addTo(stage); pn.center(stage);
    pn.scaleX=0; pn.scaleY=0;
    new Rectangle(500,410,C.panel,d.color,3,24).addTo(pn);
    new Rectangle(500,14,d.color,null,0,14).pos(0,0,LEFT,TOP,pn);
    new Label({text:"🏆",size:52}).pos(0,20,CENTER,TOP,pn);
    new Label({text:"You Did It!",size:36,font:"Fredoka One",color:C.light}).pos(0,82,CENTER,TOP,pn);
    new Label({text:str,size:26}).pos(0,126,CENTER,TOP,pn);
    new Rectangle(420,1,"#4a3880").pos(0,166,CENTER,TOP,pn);
    [["🎯","Moves",moves,C.blue,180],
     ["💡","Pairs",pairs,C.green,228],
     ["⏱","Time",fmtTime(secs),C.yellow,278]]
      .forEach(([ic,lb,vl,cl,y])=>{
        const r=new Container(420,42).addTo(pn); r.x=40; r.y=y;
        new Rectangle(420,42,C.card,null,0,10).addTo(r);
        new Label({text:ic,size:18}).pos(12,0,LEFT,CENTER,r);
        new Label({text:lb,size:13,font:"Nunito",color:C.muted,bold:true}).pos(44,0,LEFT,CENTER,r);
        new Label({text:String(vl),size:19,font:"Fredoka One",color:cl}).pos(12,0,RIGHT,CENTER,r);
      });

    // Two buttons: Play Again + Leaderboard
    const btn=new Container(180,44).addTo(pn); btn.x=60; btn.y=336;
    new Rectangle(180,44,d.color,null,0,22).addTo(btn);
    new Label({text:"Play Again",size:17,font:"Fredoka One",color:C.dark}).pos(0,0,CENTER,CENTER,btn);
    btn.cursor="pointer";
    btn.on("click",()=>{ov.removeFrom(stage); pn.removeFrom(stage); startGame(activeDiff);});

    const lbBtn2=new Container(180,44).addTo(pn); lbBtn2.x=260; lbBtn2.y=336;
    new Rectangle(180,44,"transparent",C.yellow,2,22).addTo(lbBtn2);
    new Label({text:"🏅 Leaderboard",size:14,font:"Fredoka One",color:C.yellow}).pos(0,0,CENTER,CENTER,lbBtn2);
    lbBtn2.cursor="pointer";
    lbBtn2.on("click",()=>openLeaderboard(diffKey));

    pn.addTo(stage);
    animate({target:pn,props:{scaleX:1,scaleY:1},time:380,ease:"backOut",wait:180});
    hdr.addTo(stage); ftr.addTo(stage);
  }

  // ── Intro screen ──────────────────────────────────────
  function showStart(){
    const pn=new Container(400,230).addTo(stage); pn.center(stage);
    new Rectangle(400,230,C.panel,C.blue,3,22).addTo(pn);
    new Rectangle(400,14,C.blue,null,0,14).pos(0,0,LEFT,TOP,pn);
    new Label({text:"🃏",size:46}).pos(0,18,CENTER,TOP,pn);
    new Label({text:"Ready to Play?",size:28,font:"Fredoka One",color:C.light}).pos(0,78,CENTER,TOP,pn);
    new Label({text:"Match every picture to its word",size:13,font:"Nunito",color:C.muted}).pos(0,118,CENTER,TOP,pn);
    const btn=new Container(180,44).addTo(pn); btn.x=110; btn.y=158;
    new Rectangle(180,44,C.blue,null,0,22).addTo(btn);
    new Label({text:"Start Game",size:18,font:"Fredoka One",color:C.dark}).pos(0,0,CENTER,CENTER,btn);
    btn.cursor="pointer";
    btn.on("click",()=>{ pn.removeFrom(stage); stage.update(); startTimer(); });
    pn.addTo(stage);
    hdr.addTo(stage); ftr.addTo(stage);
  }

  // ── Main game builder ─────────────────────────────────
  function startGame(diffKey){
    resetState();
    if(gameLayer){gameLayer.removeAllChildren(); gameLayer.removeFrom(stage);}
    gameLayer=new Container().addTo(stage);

    const d=DIFF[diffKey];
    const gridW=d.cols*d.cw+(d.cols-1)*d.gap;
    const gridH=d.rows*d.ch+(d.rows-1)*d.gap;
    const gx=Math.round((W-gridW)/2);
    const gy=HEADER+Math.round((H-HEADER-FOOTER-gridH)/2);

    new Rectangle(gridW+48,gridH+48,C.card,C.border,1,16)
      .pos(gx-24,gy-24,LEFT,TOP,gameLayer);

    buildDeck(d.pairs).forEach((data,i)=>{
      const col=i%d.cols, row=Math.floor(i/d.cols);
      const cx=gx+col*(d.cw+d.gap), cy=gy+row*(d.ch+d.gap);
      const card=new Container(d.cw,d.ch);
      card.x=cx; card.y=cy;
      card.data=data; card.flipped=false; card.matched=false;
      card.cw=d.cw; card.ch=d.ch;

      const bk=new Container(d.cw,d.ch);
      new Rectangle(d.cw,d.ch,C.back,C.border,1,12).addTo(bk);
      new Rectangle(d.cw-14,d.ch-14,"transparent","rgba(255,255,255,.07)",1,8).pos(7,7,LEFT,TOP,bk);
      new Label({text:"Z",size:Math.round(d.cw*.2),font:"Fredoka One",color:"rgba(255,255,255,.1)"})
        .pos(0,0,CENTER,CENTER,bk);
      bk.addTo(card);

      const ft=new Container(d.cw,d.ch); ft.visible=false;
      new Rectangle(d.cw,d.ch,"#fff",data.color,2,12).addTo(ft);
      new Rectangle(d.cw,12,data.color,null,0,12).pos(0,0,LEFT,TOP,ft);
      if(data.type==="picture"){
        new Label({text:data.emoji,size:Math.round(d.cw*.32)}).pos(0,4,CENTER,CENTER,ft);
        new Label({text:"PICTURE",size:9,font:"Nunito",color:data.color,bold:true}).pos(0,7,CENTER,BOTTOM,ft);
      } else {
        new Label({text:data.word,size:Math.round(d.cw*.16),font:"Fredoka One",color:data.color}).pos(0,4,CENTER,CENTER,ft);
        new Label({text:"WORD",size:9,font:"Nunito",color:data.color,bold:true}).pos(0,7,CENTER,BOTTOM,ft);
      }
      ft.addTo(card);
      card.bk=bk; card.ft=ft;

      card.on("mouseover",()=>{
        if(!card.flipped&&!card.matched)
          animate({target:card,props:{scaleX:1.06,scaleY:1.06},time:80,ease:"quadOut"});
      });
      card.on("mouseout",()=>{
        if(!card.flipped&&!card.matched)
          animate({target:card,props:{scaleX:1,scaleY:1},time:80,ease:"quadOut"});
      });
      card.cursor="pointer";
      card.on("click",()=>onCardClick(card));
      card.addTo(gameLayer);
    });

    hdr.addTo(stage); ftr.addTo(stage);
    showStart();
  }

  startGame("easy");
});
</script>
</body>
</html>
