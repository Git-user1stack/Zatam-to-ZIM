<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,user-scalable=no"/>
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://zimjs.org/cdn/1.5.0/createjs.js"></script>
  <script src="https://zimjs.org/cdn/018/zim_min.js"></script>

  <!-- Shared Firebase config — initialises Firebase and exposes uploadScore() -->
  <script src="../firebase-config.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0f0a1e;overflow:hidden}
    canvas{display:block}

    /* ── Leaderboard overlay ── */
    #lb-overlay{
      display:none;position:fixed;inset:0;background:rgba(10,6,30,.92);
      z-index:9999;align-items:center;justify-content:center;
      font-family:'Nunito',sans-serif;
    }
    #lb-overlay.show{display:flex;}
    #lb-box{
      background:#1a1035;border:2px solid #2d1f5e;border-radius:20px;
      width:520px;max-height:80vh;overflow:hidden;
      display:flex;flex-direction:column;
    }
    #lb-header{
      background:#251848;padding:18px 24px 14px;
      border-bottom:1px solid #2d1f5e;
      display:flex;align-items:center;justify-content:space-between;
    }
    #lb-header h2{color:#f0ecff;font-family:'Fredoka One',sans-serif;font-size:22px;margin:0;}
    #lb-header span{color:#9b8ec4;font-size:13px;}
    #lb-close{
      background:transparent;border:1px solid #2d1f5e;color:#9b8ec4;
      border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;
      display:flex;align-items:center;justify-content:center;
    }
    #lb-close:hover{background:#2d1f5e;color:#f0ecff;}
    #lb-tabs{display:flex;padding:12px 24px 0;gap:8px;background:#1a1035;}
    .lb-tab{
      padding:7px 16px;border-radius:20px;border:1px solid #2d1f5e;
      color:#9b8ec4;cursor:pointer;font-size:12px;font-weight:700;
      font-family:'Nunito',sans-serif;background:transparent;
    }
    .lb-tab.active{background:#FF6B6B;border-color:#FF6B6B;color:#0f0a1e;}
    .lb-tab[data-player="O"].active{background:#4D96FF;border-color:#4D96FF;color:#0f0a1e;}
    #lb-body{overflow-y:auto;padding:14px 24px 20px;flex:1;}
    #lb-body table{width:100%;border-collapse:collapse;}
    #lb-body th{
      color:#9b8ec4;font-size:11px;font-weight:700;text-align:left;
      padding:6px 8px;border-bottom:1px solid #2d1f5e;
    }
    #lb-body td{color:#f0ecff;font-size:13px;padding:9px 8px;border-bottom:1px solid #251848;}
    #lb-body tr:first-child td{color:#FFD93D;font-weight:800;}
    #lb-body tr:nth-child(2) td{color:#9b8ec4;}
    #lb-body tr:nth-child(3) td{color:#FF9F43;}
    .lb-medal{font-size:16px;margin-right:4px;}
    #lb-empty{color:#9b8ec4;text-align:center;padding:30px;font-size:14px;}
    #lb-loading{color:#9b8ec4;text-align:center;padding:30px;font-size:14px;}

    /* ── Player name forms ── */
    #name-form{
      display:none;position:fixed;inset:0;background:rgba(10,6,30,.95);
      z-index:10000;align-items:center;justify-content:center;
    }
    #name-form.show{display:flex;}
    #name-box{
      background:#1a1035;border:2px solid #FF6B6B;border-radius:20px;
      padding:32px 36px;width:400px;text-align:center;
      font-family:'Nunito',sans-serif;
    }
    #name-box h3{color:#f0ecff;font-family:'Fredoka One',sans-serif;font-size:24px;margin-bottom:6px;}
    #name-box p{color:#9b8ec4;font-size:13px;margin-bottom:20px;}
    .name-row{display:flex;gap:12px;margin-bottom:12px;align-items:center;}
    .player-sym{font-family:'Fredoka One',sans-serif;font-size:24px;width:36px;flex-shrink:0;}
    .name-input{
      flex:1;padding:10px 14px;border-radius:10px;
      background:#251848;border:1px solid #2d1f5e;color:#f0ecff;
      font-size:15px;font-family:'Nunito',sans-serif;outline:none;
    }
    .name-input:focus{border-color:#FF6B6B;}
    #name-submit{
      width:100%;padding:12px;border-radius:12px;border:none;
      background:#FFD93D;color:#0f0a1e;font-size:16px;font-weight:800;
      font-family:'Fredoka One',sans-serif;cursor:pointer;margin-top:8px;
    }
    #name-submit:hover{background:#ffe870;}
    #name-skip{
      background:transparent;border:none;color:#9b8ec4;
      font-size:12px;cursor:pointer;margin-top:10px;
      font-family:'Nunito',sans-serif;text-decoration:underline;
    }
  </style>
</head>
<body>

<!-- Player name setup (shown once per session) -->
<div id="name-form">
  <div id="name-box">
    <h3>👥 Set Player Names</h3>
    <p>Optionally set names for both players. Wins will be saved to the leaderboard!</p>
    <div class="name-row">
      <span class="player-sym" style="color:#FF6B6B">X</span>
      <input class="name-input" id="nameX" type="text" placeholder="Player X name" maxlength="24"/>
    </div>
    <div class="name-row">
      <span class="player-sym" style="color:#4D96FF">O</span>
      <input class="name-input" id="nameO" type="text" placeholder="Player O name" maxlength="24"/>
    </div>
    <button id="name-submit">Let's Play!</button><br/>
    <button id="name-skip">Skip</button>
  </div>
</div>

<!-- Leaderboard overlay -->
<div id="lb-overlay">
  <div id="lb-box">
    <div id="lb-header">
      <div>
        <h2>🏅 Leaderboard</h2>
        <span>Tic Tac Toe · Most wins</span>
      </div>
      <button id="lb-close">✕</button>
    </div>
    <div id="lb-tabs">
      <button class="lb-tab active" data-player="X">Player X</button>
      <button class="lb-tab" data-player="O">Player O</button>
    </div>
    <div id="lb-body">
      <div id="lb-loading">Loading…</div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  FIREBASE — uses shared firebase-config.js loaded above.
//  That file initialises the app and exposes uploadScore().
// ════════════════════════════════════════════════════════

// ── Player name storage ────────────────────────────────
const NAMES_KEY = 'zatam_ttt_names';
function getNames(){ try{ return JSON.parse(localStorage.getItem(NAMES_KEY))||{X:'Player X',O:'Player O'}; }catch(e){ return {X:'Player X',O:'Player O'}; } }
function setNames(x,o){ localStorage.setItem(NAMES_KEY, JSON.stringify({X:x||'Player X',O:o||'Player O'})); }

// ── Score submission — calls the shared uploadScore() ──
// Each win is submitted as score=1; the leaderboard ranks by win count.
function submitWin(winnerSymbol, winnerName){
  const finalScore = 1; // one win event
  if(typeof uploadScore === 'function'){
    uploadScore({
      userId    : '',          // firebase-config.js fills from auth if available
      playerName: winnerName || 'Anonymous',
      email     : '',
      photoURL  : '',
      gameId    : 'ticTacToe',
      gameName  : 'Tic Tac Toe',
      score     : finalScore,
      createdAt : new Date(),
      scoreDate : new Date().toISOString(),
    });
  } else {
    console.warn('[TicTacToe] uploadScore not found – is firebase-config.js loaded?');
  }
}

// ── Leaderboard fetch & render ─────────────────────────
let currentLbPlayer = 'X';

async function fetchLeaderboard(player){
  const body = document.getElementById('lb-body');
  body.innerHTML = '<div id="lb-loading">Loading…</div>';

  const firestore = (typeof db !== 'undefined') ? db : null;
  if(!firestore){
    body.innerHTML = '<div id="lb-empty">Leaderboard not available<br><small>firebase-config.js not loaded</small></div>';
    return;
  }
  try{
    // Pull all ticTacToe wins, aggregate by playerName client-side
    const snap = await firestore.collection('leaderboard')
      .where('gameId','==','ticTacToe')
      .orderBy('createdAt','desc')
      .limit(200)
      .get();

    if(snap.empty){ body.innerHTML = '<div id="lb-empty">No wins recorded yet – play and win! 🎯</div>'; return; }

    const counts = {};
    snap.docs.forEach(doc=>{
      const n = doc.data().playerName || 'Anonymous';
      counts[n] = (counts[n]||0) + 1;
    });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const medals = ['🥇','🥈','🥉'];
    let html = '<table><thead><tr><th>#</th><th>Player</th><th>Wins</th></tr></thead><tbody>';
    sorted.forEach(([name,wins],i)=>{
      const m = medals[i] ? `<span class="lb-medal">${medals[i]}</span>` : '';
      html += `<tr><td>${m}${i+1}</td><td>${escHtml(name)}</td><td>${wins}</td></tr>`;
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  } catch(e){
    console.error('[TicTacToe] fetchLeaderboard error', e);
    body.innerHTML = '<div id="lb-empty">Error loading scores.</div>';
  }
}

function escHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function openLeaderboard(player){
  currentLbPlayer = player||'X';
  document.querySelectorAll('.lb-tab').forEach(t=> t.classList.toggle('active', t.dataset.player===currentLbPlayer));
  document.getElementById('lb-overlay').classList.add('show');
  fetchLeaderboard(currentLbPlayer);
}
document.getElementById('lb-close').onclick = ()=> document.getElementById('lb-overlay').classList.remove('show');
document.querySelectorAll('.lb-tab').forEach(t=>{
  t.onclick = ()=>{ currentLbPlayer=t.dataset.player; document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); fetchLeaderboard(currentLbPlayer); };
});

// ── Name setup ─────────────────────────────────────────
let _namesResolve = null;
let playerNames = getNames();

function askPlayerNames(){
  return new Promise(resolve=>{
    _namesResolve = resolve;
    const n = getNames();
    document.getElementById('nameX').value = n.X !== 'Player X' ? n.X : '';
    document.getElementById('nameO').value = n.O !== 'Player O' ? n.O : '';
    document.getElementById('name-form').classList.add('show');
    document.getElementById('nameX').focus();
  });
}
function resolveNames(){
  const x = document.getElementById('nameX').value.trim() || 'Player X';
  const o = document.getElementById('nameO').value.trim() || 'Player O';
  setNames(x,o);
  playerNames = {X:x, O:o};
  document.getElementById('name-form').classList.remove('show');
  if(_namesResolve){ _namesResolve(playerNames); _namesResolve=null; }
}
document.getElementById('name-submit').onclick = resolveNames;
document.getElementById('name-skip').onclick = ()=>{
  document.getElementById('name-form').classList.remove('show');
  if(_namesResolve){ _namesResolve(playerNames); _namesResolve=null; }
};

// ════════════════════════════════════════════════════════
//  GAME
// ════════════════════════════════════════════════════════

const C = {
  bg:"#0f0a1e", panel:"#1a1035", card:"#251848", border:"#2d1f5e",
  gridLine:"#3a2a6e", gridGlow:"#6a4aae",
  X:"#FF6B6B", O:"#4D96FF", yellow:"#FFD93D",
  muted:"#9b8ec4", light:"#f0ecff", dark:"#0f0a1e",
};

const LINES = [
  [[0,0],[0,1],[0,2]],[[1,0],[1,1],[1,2]],[[2,0],[2,1],[2,2]],
  [[0,0],[1,0],[2,0]],[[0,1],[1,1],[2,1]],[[0,2],[1,2],[2,2]],
  [[0,0],[1,1],[2,2]],[[0,2],[1,1],[2,0]],
];
const emptyBoard = ()=>Array.from({length:3},()=>[null,null,null]);
function checkWin(b,p){ return LINES.find(([a,m,c])=>b[a[0]][a[1]]===p&&b[m[0]][m[1]]===p&&b[c[0]][c[1]]===p)||null; }
function isFull(b){ return b.every(r=>r.every(c=>c!==null)); }

let _ac;
function tone(f,t,d,v,dl=0){
  try{
    _ac=_ac||new(window.AudioContext||window.webkitAudioContext)();
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.connect(g);g.connect(_ac.destination);o.type=t;
    o.frequency.setValueAtTime(f,_ac.currentTime+dl);
    g.gain.setValueAtTime(v,_ac.currentTime+dl);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+dl+d);
    o.start(_ac.currentTime+dl);o.stop(_ac.currentTime+dl+d);
  }catch(e){}
}
const SFX={
  place:()=>tone(440,"sine",.08,.14),
  win:  ()=>[392,523,659,784].forEach((f,i)=>tone(f,"sine",.2,.16,i*.09)),
  draw: ()=>{tone(300,"sine",.2,.1);tone(250,"sine",.2,.09,.18);},
};

const GW=1024, GH=768, HEADER=90, FOOTER=60;
const BOARD=420, CELL=140, LTHICK=6, PAD=24;

const frame = new Frame(FIT, GW, GH, C.bg, C.bg);
frame.on("ready",()=>{
  const stage=frame.stage;
  const W=frame.width, H=frame.height;

  createjs.Ticker.timingMode=createjs.Ticker.RAF;
  createjs.Ticker.on("tick",stage);

  const bgS=new Shape(W,H);
  for(let x=0;x<W;x+=44) for(let y=0;y<H;y+=44)
    bgS.graphics.beginFill("rgba(255,255,255,.04)").drawCircle(x,y,1.5).endFill();
  bgS.addTo(stage);
  const glS=new Shape(W,H);
  glS.graphics.beginRadialGradientFill(
    ["rgba(100,70,220,.35)","rgba(15,10,30,0)"],[0,1],
    W*.38,H*.5,0, W*.38,H*.5,W*.5
  ).drawRect(0,0,W,H).endFill();
  glS.addTo(stage);

  const bpSz=BOARD+PAD*2;
  const bpX=Math.round((W*.5-bpSz)/2);
  const bpY=HEADER+Math.round((H-HEADER-FOOTER-bpSz)/2);
  const ox=bpX+PAD, oy=bpY+PAD;

  new Rectangle(bpSz+8,bpSz+8,"transparent",C.gridGlow,2,20).pos(bpX-4,bpY-4,LEFT,TOP,stage);
  new Rectangle(bpSz,bpSz,C.card,C.border,1,16).pos(bpX,bpY,LEFT,TOP,stage);

  for(let i=1;i<3;i++){
    const lx=ox+i*CELL;
    const sv=new Shape();
    sv.graphics.beginFill(C.gridGlow+"44").drawRoundRect(lx-LTHICK/2-3,oy-4,LTHICK+6,BOARD+8,4).endFill();
    sv.graphics.beginFill(C.gridLine).drawRoundRect(lx-LTHICK/2,oy,LTHICK,BOARD,3).endFill();
    sv.addTo(stage);
    const ly=oy+i*CELL;
    const sh=new Shape();
    sh.graphics.beginFill(C.gridGlow+"44").drawRoundRect(ox-4,ly-LTHICK/2-3,BOARD+8,LTHICK+6,4).endFill();
    sh.graphics.beginFill(C.gridLine).drawRoundRect(ox,ly-LTHICK/2,BOARD,LTHICK,3).endFill();
    sh.addTo(stage);
  }

  // ── Right panel ───────────────────────────────────────
  const px=Math.round(W*.5)+10, pw=W-px-16, py=HEADER+10, ph=H-HEADER-FOOTER-20;
  new Rectangle(pw,ph,C.card,C.border,1,16).pos(px,py,LEFT,TOP,stage);

  // Dynamic player name labels on the cards
  const xNameLbl = {}, oNameLbl = {};
  function playerCard(sym,color,yo){
    const c=new Container(pw-32,76).addTo(stage); c.x=px+16; c.y=py+yo;
    new Rectangle(pw-32,76,C.panel,color,2,12).addTo(c);
    new Label({text:sym,size:32,font:"Fredoka One",color}).pos(18,0,LEFT,CENTER,c);
    const nl=new Label({text:playerNames[sym],size:15,font:"Fredoka One",color:C.light}).pos(62,-5,LEFT,CENTER,c);
    new Label({text:"Player",size:11,font:"Nunito",color:C.muted}).pos(64,9,LEFT,CENTER,c);
    if(sym==='X') xNameLbl.ref=nl; else oNameLbl.ref=nl;
    return c;
  }
  playerCard("X",C.X,16);
  playerCard("O",C.O,108);

  const vs=new Container(40,40).addTo(stage); vs.x=px+(pw-40)/2; vs.y=py+96;
  const vsCirc=new Circle(20,C.border,C.gridGlow,2); vsCirc.x=20; vsCirc.y=20; vsCirc.addTo(vs);
  new Label({text:"VS",size:11,font:"Fredoka One",color:C.muted}).pos(0,0,CENTER,CENTER,vs);

  new Rectangle(pw-32,1,C.border).pos(px+16,py+200,LEFT,TOP,stage);
  new Label({text:"HOW TO PLAY",size:11,font:"Nunito",color:C.muted,bold:true}).pos(px+16,py+214,LEFT,TOP,stage);
  ["Take turns clicking cells","Get 3 in a row to win","Row, column, or diagonal"].forEach((t,i)=>{
    new Circle(4,C.yellow).pos(px+20,py+240+i*28,LEFT,TOP,stage);
    new Label({text:t,size:12,font:"Nunito",color:C.muted}).pos(px+34,py+236+i*28,LEFT,TOP,stage);
  });

  // Leaderboard button on right panel
  new Rectangle(pw-32,1,C.border).pos(px+16,py+ph-110,LEFT,TOP,stage);
  const lbPanelBtn=new Container(pw-32,40).addTo(stage); lbPanelBtn.x=px+16; lbPanelBtn.y=py+ph-96;
  new Rectangle(pw-32,40,"transparent",C.yellow,1,20).addTo(lbPanelBtn);
  new Label({text:"🏅 Leaderboard",size:13,font:"Fredoka One",color:C.yellow}).pos(0,0,CENTER,CENTER,lbPanelBtn);
  lbPanelBtn.cursor="pointer";
  lbPanelBtn.on("click",()=>openLeaderboard('X'));

  new Rectangle(pw-32,1,C.border).pos(px+16,py+ph-46,LEFT,TOP,stage);
  const newBtn=new Container(pw-32,40).addTo(stage); newBtn.x=px+16; newBtn.y=py+ph-40;
  const newBtnBg=new Rectangle(pw-32,40,C.yellow,null,0,20).addTo(newBtn);
  new Label({text:"New Game",size:18,font:"Fredoka One",color:C.dark}).pos(0,0,CENTER,CENTER,newBtn);
  newBtn.cursor="pointer";
  newBtn.on("mouseover",()=>animate({target:newBtn,props:{scaleX:1.04,scaleY:1.04},time:80,ease:"quadOut"}));
  newBtn.on("mouseout", ()=>animate({target:newBtn,props:{scaleX:1,scaleY:1},time:80,ease:"quadOut"}));

  // ── Header ────────────────────────────────────────────
  const hdr=new Container(W,HEADER).addTo(stage);
  new Rectangle(W,HEADER,C.panel).addTo(hdr);
  new Rectangle(W,3,C.yellow).pos(0,HEADER-3,LEFT,TOP,hdr);
  new Label({text:"Tic Tac Toe",size:34,font:"Fredoka One",color:C.light}).pos(32,-6,LEFT,CENTER,hdr);
  new Label({text:"Zatam to Zim · Two Player",size:13,font:"Nunito",color:C.muted}).pos(36,14,LEFT,CENTER,hdr);

  function scoreBlock(lbl,val,color,x){
    const b=new Container(96,56).addTo(hdr); b.x=x; b.y=(HEADER-56)/2;
    new Rectangle(96,56,C.card,color,2,10).addTo(b);
    new Label({text:lbl,size:10,font:"Nunito",color:C.muted,bold:true}).pos(0,7,CENTER,TOP,b);
    const v=new Label({text:String(val),size:22,font:"Fredoka One",color}).pos(0,0,CENTER,CENTER,b);
    return v;
  }
  const grpX=Math.round(W/2-214);
  const xScLbl=scoreBlock("X WINS","0",C.X,    grpX);
  const oScLbl=scoreBlock("O WINS","0",C.O,    grpX+108);
  const drLbl =scoreBlock("DRAWS", "0",C.yellow,grpX+216);

  const pill=new Container(180,44).addTo(hdr);
  pill.x=grpX+332; pill.y=(HEADER-44)/2;
  const pillBg=new Rectangle(180,44,C.X,null,0,22).addTo(pill);
  const pillTxt=new Label({text:"X's Turn",size:18,font:"Fredoka One",color:C.dark}).pos(0,0,CENTER,CENTER,pill);

  const resetBtn=new Container(110,36).addTo(hdr);
  resetBtn.x=W-122; resetBtn.y=(HEADER-36)/2;
  const resetBtnBg=new Rectangle(110,36,"transparent","rgba(255,255,255,.25)",1,18).addTo(resetBtn);
  new Label({text:"↺ Reset All",size:11,font:"Nunito",color:"rgba(255,255,255,.7)",bold:true}).pos(0,0,CENTER,CENTER,resetBtn);
  resetBtn.cursor="pointer";
  resetBtn.on("mouseover",()=>{resetBtnBg.color="rgba(255,255,255,.12)";});
  resetBtn.on("mouseout", ()=>{resetBtnBg.color="transparent";});
  resetBtn.on("click",()=>{xSc=0;oSc=0;dSc=0;xScLbl.text="0";oScLbl.text="0";drLbl.text="0";resetBoard();});

  // ── Footer ────────────────────────────────────────────
  const ftr=new Container(W,FOOTER).addTo(stage); ftr.y=H-FOOTER;
  new Rectangle(W,FOOTER,C.panel).addTo(ftr);
  const ftrLine=new Rectangle(W,3,C.X).pos(0,0,LEFT,TOP,ftr);
  const statusLbl=new Label({text:"X goes first — click any cell!",size:14,font:"Nunito",color:C.muted})
    .pos(0,0,CENTER,CENTER,ftr);

  const ml=new Container().addTo(stage);
  const el=new Container().addTo(stage);
  let xSc=0, oSc=0, dSc=0;
  let board=emptyBoard(), cur="X", over=false;

  function setTurnUI(player,msg){
    const color=player==="X"?C.X:C.O;
    const name=playerNames[player]||('Player '+player);
    pillBg.color=color;
    pillTxt.text=name+"'s Turn";
    ftrLine.color=color;
    statusLbl.text=msg||(name+" — click any cell!");
  }

  function placeX(cx,cy){
    const pad=28, x1=cx+pad,y1=cy+pad,x2=cx+CELL-pad,y2=cy+CELL-pad;
    const wrapper=new Container().addTo(ml);
    const s=new Shape();
    s.graphics.setStrokeStyle(22,"round").beginStroke(C.X+"44")
      .moveTo(x1,y1).lineTo(x2,y2).moveTo(x2,y1).lineTo(x1,y2).endStroke();
    s.graphics.setStrokeStyle(8,"round").beginStroke(C.X)
      .moveTo(x1,y1).lineTo(x2,y2).moveTo(x2,y1).lineTo(x1,y2).endStroke();
    s.addTo(wrapper);
  }
  function placeO(cx,cy){
    const r=CELL/2-28, cx2=cx+CELL/2, cy2=cy+CELL/2;
    const wrapper=new Container().addTo(ml);
    const s=new Shape();
    s.graphics.setStrokeStyle(22,"round").beginStroke(C.O+"44").drawCircle(cx2,cy2,r).endStroke();
    s.graphics.setStrokeStyle(8,"round").beginStroke(C.O).drawCircle(cx2,cy2,r).endStroke();
    s.addTo(wrapper);
  }

  function drawWinLine(line,color){
    const [a,,c]=line;
    const x1=ox+a[1]*CELL+CELL/2, y1=oy+a[0]*CELL+CELL/2;
    const x2=ox+c[1]*CELL+CELL/2, y2=oy+c[0]*CELL+CELL/2;
    const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy)+32;
    const ang=Math.atan2(dy,dx)*180/Math.PI;
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const glow=new Shape();
    glow.graphics.setStrokeStyle(20,"round").beginStroke(color+"66")
      .moveTo(-len/2,0).lineTo(len/2,0).endStroke();
    glow.x=mx; glow.y=my; glow.rotation=ang; glow.addTo(el);
    const line2=new Shape();
    line2.graphics.setStrokeStyle(7,"round").beginStroke(color)
      .moveTo(-len/2,0).lineTo(len/2,0).endStroke();
    line2.x=mx; line2.y=my; line2.rotation=ang; line2.addTo(el);
    const winners=new Set(line.map(([r,cc])=>`${r},${cc}`));
    for(let r=0;r<3;r++) for(let cc=0;cc<3;cc++){
      if(!winners.has(`${r},${cc}`)&&board[r][cc]){
        new Rectangle(CELL-4,CELL-4,"rgba(15,10,30,.6)",null,0,8)
          .pos(ox+cc*CELL+2,oy+r*CELL+2,LEFT,TOP,el);
      }
    }
  }

  function handleWin(player,wl){
    over=true; SFX.win();
    const name=playerNames[player]||('Player '+player);
    if(player==="X"){xSc++;xScLbl.text=String(xSc);}else{oSc++;oScLbl.text=String(oSc);}
    const color=player==="X"?C.X:C.O;
    pillBg.color=color; pillTxt.text=name+" Wins! 🎉";
    ftrLine.color=color;
    statusLbl.text=name+" wins! Hit New Game to play again.";
    setTimeout(()=>drawWinLine(wl,color),150);
    // Submit score to Firebase
    submitWin(player, name);
  }
  function handleDraw(){
    over=true; SFX.draw();
    dSc++; drLbl.text=String(dSc);
    pillBg.color=C.yellow; pillTxt.text="It's a Draw!";
    ftrLine.color=C.yellow;
    statusLbl.text="Draw! No moves left. Hit New Game.";
  }

  function resetBoard(){
    board=emptyBoard(); cur="X"; over=false;
    ml.removeAllChildren(); el.removeAllChildren();
    setTurnUI("X","X goes first — click any cell!");
    hitLayer.addTo(stage);
    hdr.addTo(stage); ftr.addTo(stage);
  }

  newBtn.on("click",()=>resetBoard());

  const hitLayer=new Container().addTo(stage);

  for(let row=0;row<3;row++){
    for(let col=0;col<3;col++){
      const cx=ox+col*CELL, cy=oy+row*CELL;
      const hov=new Rectangle(CELL-2,CELL-2,"transparent","transparent",0,6);
      hov.x=cx+1; hov.y=cy+1; hov.addTo(hitLayer);
      const hit=new Rectangle(CELL-2,CELL-2,"#ffffff");
      hit.x=cx+1; hit.y=cy+1; hit.alpha=0.01; hit.addTo(hitLayer);
      hit.cursor="pointer";
      let ghost=null;
      hit.on("mouseover",()=>{
        if(over||board[row][col]) return;
        hov.color="rgba(255,255,255,.06)";
        const color=(cur==="X"?C.X:C.O)+"66";
        ghost=new Label({text:cur,size:58,font:"Fredoka One",color});
        ghost.x=cx+CELL/2-18; ghost.y=cy+CELL/2-32;
        ghost.addTo(ml); stage.update();
      });
      hit.on("mouseout",()=>{
        hov.color="transparent";
        if(ghost){ghost.removeFrom(ml);ghost=null;} stage.update();
      });
      hit.on("click",()=>{
        if(over||board[row][col]) return;
        board[row][col]=cur; SFX.place();
        if(ghost){ghost.removeFrom(ml);ghost=null;}
        cur==="X"?placeX(cx,cy):placeO(cx,cy);
        const wl=checkWin(board,cur);
        if(wl){handleWin(cur,wl); stage.update(); return;}
        if(isFull(board)){handleDraw(); stage.update(); return;}
        cur=cur==="X"?"O":"X";
        setTurnUI(cur); stage.update();
      });
    }
  }

  hdr.addTo(stage); ftr.addTo(stage);
  setTurnUI("X");

  // Ask for names on first load
  const saved = getNames();
  if(saved.X === 'Player X' && saved.O === 'Player O'){
    // Haven't set names yet — prompt after a short delay
    setTimeout(()=> askPlayerNames().then(()=>{
      // refresh name labels in the ZIM UI — we can't easily update them,
      // so we just store names for future score submissions.
      setTurnUI("X");
    }), 800);
  }
});
</script>
</body>
</html>
